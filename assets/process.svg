<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">Black garlic fermentation timeline</title>
  <desc id="desc">A visual timeline showing fresh garlic, controlled heat and humidity, slow fermentation, and finished black garlic.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#efd7a3"/>
      <stop offset="1" stop-color="#b98633"/>
    </linearGradient>
    <radialGradient id="dark" cx="35%" cy="25%" r="70%">
      <stop offset="0" stop-color="#5b473d"/>
      <stop offset=".5" stop-color="#171111"/>
      <stop offset="1" stop-color="#050404"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="360" rx="8" fill="#17130f"/>
  <path d="M90 178h820" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <circle cx="130" cy="178" r="62" fill="#f0e1ca"/>
    <path d="M86 180c6-46 39-78 77-72 39 6 68 49 59 91-11 54-62 76-103 50-24-15-37-38-33-69z" fill="#dfd0bd"/>
    <text x="130" y="285" font-size="25" font-weight="700" fill="#f5ead8">Fresh Garlic</text>
    <text x="130" y="316" font-size="17" fill="#cdb88e">Bawang putih pilihan</text>
    <circle cx="380" cy="178" r="62" fill="#34251c"/>
    <path d="M353 213c-13-32-6-71 22-93 30 25 39 65 21 96" fill="none" stroke="#dfb15d" stroke-width="13" stroke-linecap="round"/>
    <path d="M401 216c-7-25-1-51 18-70" fill="none" stroke="#f0d492" stroke-width="10" stroke-linecap="round"/>
    <text x="380" y="285" font-size="25" font-weight="700" fill="#f5ead8">Controlled Warmth</text>
    <text x="380" y="316" font-size="17" fill="#cdb88e">Suhu dan kelembapan stabil</text>
    <circle cx="630" cy="178" r="62" fill="#241a14"/>
    <path d="M605 122c36 21 51 60 37 112M658 126c-29 29-36 68-23 110" stroke="#c99b4b" stroke-width="10" stroke-linecap="round" fill="none"/>
    <text x="630" y="285" font-size="25" font-weight="700" fill="#f5ead8">Slow Fermentation</text>
    <text x="630" y="316" font-size="17" fill="#cdb88e">Berminggu-minggu, tanpa aditif</text>
    <circle cx="880" cy="178" r="62" fill="url(#dark)"/>
    <path d="M840 187c27-33 68-45 102-18M867 122c-25 41-28 81-9 119" stroke="#5f4a3f" stroke-width="9" stroke-linecap="round" fill="none"/>
    <text x="880" y="285" font-size="25" font-weight="700" fill="#f5ead8">Sweet Umami Finish</text>
    <text x="880" y="316" font-size="17" fill="#cdb88e">Tekstur lembut, rasa premium</text>
  </g>
</svg>
